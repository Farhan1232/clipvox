services:
  # ── Backend (Go) ──────────────────────────────────────────────
  - type: web
    name: clipvox-backend
    runtime: go
    rootDir: backend
    buildCommand: go build -o server .
    startCommand: ./server
    plan: free
    envVars:
      - key: PORT
        value: 10000
      - key: GIN_MODE
        value: release

  # ── Frontend (React / Vite static site) ───────────────────────
  - type: web
    name: clipvox-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: clipvox-backend
          type: web
          property: host
