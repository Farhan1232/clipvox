services:
  # ── Backend (Go + ffmpeg + LibreOffice, Docker) ───────────────
  - type: web
    name: clipvox-backend
    runtime: docker
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 10000

  # ── Frontend (React / Vite static site) ───────────────────────
  - type: web
    name: clipvox-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    plan: free
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        fromService:
          name: clipvox-backend
          type: web
          property: host
